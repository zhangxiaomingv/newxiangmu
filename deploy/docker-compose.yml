version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AI_ENGINE=${AI_ENGINE:-auto}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
    volumes:
      - data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.zkoner.com/api
    depends_on:
      - backend

volumes:
  data:
